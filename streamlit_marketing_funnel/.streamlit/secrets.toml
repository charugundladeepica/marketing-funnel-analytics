# .streamlit/secrets.toml
# ─────────────────────────────────────────────────────────────────────────────
# Add this file for LOCAL dev if you prefer secrets over gcloud ADC.
# On Streamlit Cloud: paste these values in the Secrets section of your app
# settings (Settings → Secrets). Never commit this file to GitHub.
# ─────────────────────────────────────────────────────────────────────────────

[gcp_service_account]
type                        = "service_account"
project_id                  = "YOUR_GCP_PROJECT_ID"
private_key_id              = "YOUR_PRIVATE_KEY_ID"
private_key                 = "-----BEGIN RSA PRIVATE KEY-----\nYOUR_KEY\n-----END RSA PRIVATE KEY-----\n"
client_email                = "YOUR_SERVICE_ACCOUNT@YOUR_PROJECT.iam.gserviceaccount.com"
client_id                   = "YOUR_CLIENT_ID"
auth_uri                    = "https://accounts.google.com/o/oauth2/auth"
token_uri                   = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url        = "https://www.googleapis.com/robot/v1/metadata/x509/YOUR_SERVICE_ACCOUNT"
